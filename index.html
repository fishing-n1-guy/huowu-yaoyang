<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>火武耀揚 — 目錄閱讀器</title>
<style>
:root {
  --bg: #1a1a1a;
  --sidebar-bg: #111;
  --text: #ddd;
  --accent: #c0392b;
  --accent2: #e74c3c;
  --border: #333;
  --hover: #2a2a2a;
  --active: #3a1a1a;
  --gold: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* Top Bar */
.topbar {
  background: #0a0a0a;
  border-bottom: 2px solid var(--accent);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.topbar h1 {
  font-size: 1.3em;
  color: var(--accent2);
  white-space: nowrap;
  text-shadow: 2px 2px 4px rgba(231,76,60,0.3);
}
.topbar .subtitle { font-size: 0.7em; color: #888; margin-left: 4px; }
.topbar .spacer { flex:1; }
.topbar button {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85em;
  white-space: nowrap;
  transition: background 0.2s;
}
.topbar button:hover { background: var(--accent2); }
.topbar button.secondary { background: #333; }
.topbar button.secondary:hover { background: #555; }
.topbar input {
  background: #222;
  border: 1px solid #444;
  color: #fff;
  padding: 7px 10px;
  border-radius: 4px;
  font-size: 0.85em;
  width: 160px;
  outline: none;
}
.topbar input:focus { border-color: var(--accent); }

/* Layout */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85em;
  color: #aaa;
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar-header .count { color: var(--gold); }
.chapter-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.chapter-list::-webkit-scrollbar { width: 6px; }
.chapter-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.chapter-item {
  display: block;
  padding: 7px 14px;
  color: #ccc;
  text-decoration: none;
  font-size: 0.82em;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  cursor: pointer;
}
.chapter-item:hover { background: var(--hover); color: #fff; }
.chapter-item.active {
  background: var(--active);
  border-left-color: var(--accent);
  color: var(--accent2);
  font-weight: bold;
}
.chapter-item.bookmarked {
  border-left-color: var(--gold);
}
.chapter-item .ch-num { color: #888; font-size: 0.8em; margin-right: 6px; }

/* Content Area */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #000;
}
.content-placeholder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #666;
  gap: 16px;
}
.content-placeholder .logo {
  font-size: 4em;
  color: var(--accent);
  text-shadow: 0 0 40px rgba(231,76,60,0.5);
}
.content-placeholder p { font-size: 0.9em; }
.content-iframe {
  flex: 1;
  width: 100%;
  border: none;
  display: none;
}

/* Mobile toggle */
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  font-size: 1.5em;
  cursor: pointer;
  padding: 0 4px;
}

@media (max-width: 768px) {
  .sidebar { position:fixed; left:-280px; top:48px; bottom:0; z-index:20; transition:left 0.3s; }
  .sidebar.open { left:0; }
  .menu-toggle { display:block; }
  .topbar input { width:100px; }
  .topbar h1 { font-size: 1em; }
}

/* Status bar */
.status-bar {
  background: #0a0a0a;
  border-top: 1px solid var(--border);
  padding: 4px 14px;
  font-size: 0.7em;
  color: #666;
  flex-shrink: 0;
  display: flex; gap: 16px;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
  <h1>🔥 火武耀揚</h1>
  <span class="subtitle">邱瑞新</span>
  <span class="spacer"></span>
  <input type="text" id="searchInput" placeholder="搜尋回數..." oninput="filterChapters()">
  <button id="continueBtn" onclick="continueReading()">▶ 繼續閱讀</button>
  <button class="secondary" onclick="toggleSidebar()">📋 目錄</button>
</div>

<!-- Main Layout -->
<div class="main-layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>📖 全部回數</span>
      <span class="count" id="totalCount"></span>
    </div>
    <div class="chapter-list" id="chapterList"></div>
  </div>

  <!-- Content -->
  <div class="content" id="contentArea">
    <div class="content-placeholder" id="placeholder">
      <div class="logo">🔥</div>
      <p>👈 喺目錄揀一回開始閱讀</p>
      <p style="font-size:0.75em;color:#444;">或撳「繼續閱讀」跳去上次進度</p>
    </div>
    <iframe class="content-iframe" id="readerFrame" 
            sandbox="allow-scripts allow-same-origin"
            allowfullscreen="true"
            loading="lazy"></iframe>
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <span id="statusBookmark">書籤：未有</span>
  <span id="statusTotal"></span>
</div>

// ===== STATE =====
var currentIndex = -1;
var storageKey = 'huowu_yaoyang_progress';

// ===== INIT =====
function init() {
  document.getElementById('totalCount').textContent = CHAPTERS.length + ' 回';
  document.getElementById('statusTotal').textContent = '共 ' + CHAPTERS.length + ' 回';
  renderChapterList();
  loadProgress();
  
  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      var dir = e.key === 'ArrowUp' ? -1 : 1;
      navigateChapter(dir);
    }
  });
}

function renderChapterList(filter) {
  var list = document.getElementById('chapterList');
  var html = '';
  var filtered = filter ? CHAPTERS.filter(function(c) {
    return c.label.indexOf(filter) !== -1 || c.num.indexOf(filter) !== -1;
  }) : CHAPTERS;
  
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var realIdx = CHAPTERS.indexOf(c);
    var cls = 'chapter-item';
    if (realIdx === currentIndex) cls += ' active';
    if (realIdx === getBookmark()) cls += ' bookmarked';
    html += '<div class="' + cls + '" onclick="openChapter(' + realIdx + ')" title="' + c.label + '">' +
            '<span class="ch-num">#' + c.num + '</span>' + c.label + '</div>';
  }
  
  if (filtered.length === 0) {
    html = '<div style="padding:20px;color:#666;text-align:center;">無匹配結果</div>';
  }
  
  list.innerHTML = html;
  
  // Scroll to current chapter
  if (currentIndex >= 0 && !filter) {
    setTimeout(function() {
      var items = list.querySelectorAll('.chapter-item');
      if (items[currentIndex]) {
        items[currentIndex].scrollIntoView({block: 'center', behavior: 'smooth'});
      }
    }, 100);
  }
}

// ===== CHAPTER NAVIGATION =====
function openChapter(index) {
  if (index < 0 || index >= CHAPTERS.length) return;
  currentIndex = index;
  var ch = CHAPTERS[index];
  
  // Always open in new tab (most comic sites block iframes)
  var win = window.open(ch.url, '_blank');
  
  // Update UI
  renderChapterList();
  updateStatusBar();
  saveProgress();
  
  // Close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
  
  // Flash feedback
  var statusBar = document.getElementById('statusBookmark');
  statusBar.textContent = '✅ 已開啟 ' + ch.label + ' (新分頁)';
  setTimeout(updateStatusBar, 2000);
}

function continueReading() {
  var bookmark = getBookmark();
  if (bookmark >= 0 && bookmark < CHAPTERS.length) {
    openChapter(bookmark);
  } else {
    openChapter(CHAPTERS.length - 1); // Start from latest
  }
}

function navigateChapter(dir) {
  if (currentIndex < 0) return;
  var newIdx = currentIndex + dir;
  if (newIdx >= 0 && newIdx < CHAPTERS.length) {
    openChapter(newIdx);
  }
}

// ===== BOOKMARK / PROGRESS =====
function saveProgress() {
  try {
    var data = {
      index: currentIndex,
      chapter: CHAPTERS[currentIndex] ? CHAPTERS[currentIndex].label : '',
      timestamp: new Date().toISOString()
    };
    localStorage.setItem(storageKey, JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    var raw = localStorage.getItem(storageKey);
    if (raw) {
      var data = JSON.parse(raw);
      if (data.index >= 0 && data.index < CHAPTERS.length) {
        currentIndex = data.index;
        updateStatusBar();
      }
    }
  } catch(e) {}
}

function getBookmark() {
  try {
    var raw = localStorage.getItem(storageKey);
    if (raw) {
      return JSON.parse(raw).index;
    }
  } catch(e) {}
  return -1;
}

function updateStatusBar() {
  var el = document.getElementById('statusBookmark');
  if (currentIndex >= 0 && currentIndex < CHAPTERS.length) {
    el.textContent = '📌 書籤：' + CHAPTERS[currentIndex].label;
  } else {
    el.textContent = '書籤：未有';
  }
}

// ===== SEARCH =====
function filterChapters() {
  var q = document.getElementById('searchInput').value.trim();
  renderChapterList(q || null);
}

// ===== SIDEBAR TOGGLE =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== STARTUP =====
init();
</script>
